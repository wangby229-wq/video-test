server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;
    http2 on;
    listen [::]:80;
    server_name wemeet.bijienetworks.com;
    index index.php index.html index.htm default.php default.htm default.html;  
    root /www/wwwroot/wemeet.bijienetworks.com;
    include /www/server/panel/vhost/nginx/well-known/wemeet.bijienetworks.com.conf;
    include /www/server/panel/vhost/nginx/extension/wemeet.bijienetworks.com/*.conf;

    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    ssl_certificate    /www/server/panel/vhost/cert/wemeet.bijienetworks.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/wemeet.bijienetworks.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;

    error_page 404 /404.html;

    include enable-php-82.conf;

    include /www/server/panel/vhost/rewrite/wemeet.bijienetworks.com.conf;

    # ===== 会议转录系统 API 直接代理 =====
    location ^~ /api/ {
            proxy_pass http://127.0.0.1:8090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 500M;
            proxy_read_timeout 300s;
    }

    # ===== 会议转录系统 - 前端静态文件 =====
    location ~ ^/meeting/ {
            root /opt/wechat_meeting/dist;
            index index.html;
            try_files $uri $uri/ /meeting/index.html;
    }

    location ^~ /meeting/uploads/ {
            rewrite ^/meeting/uploads/(.*)$ /uploads/$1 break;
            alias /opt/wechat_meeting/uploads/;
            autoindex off;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }
    access_log  /www/wwwlogs/wemeet.bijienetworks.com.log;
    error_log  /www/wwwlogs/wemeet.bijienetworks.com.error.log;
}
# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user root;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 4096;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;
    client_max_body_size 4096M;
#    upstream backend { 
    	  #ip_hash;
#	  least_conn; 
 #         server 172.31.43.191:9999 weight=1;  
#	  server 172.31.44.32:9999 weight=1;  
#	}  
#	  upstream backendmq {
 #         least_conn;
  #        server 172.31.41.121:8083 max_fails=2 fail_timeout=30s weight=1;
 #         server 172.31.32.151:8083 max_fails=2 fail_timeout=30s weight=1;
  #      }

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;
  

    server {
        listen       80;
#	listen       443 ssl;
 #       ssl_certificate "cert.pem";
 #       ssl_certificate_key "cert.key";
        #listen       [::]:80;
        server_name  _;
        root         /usr/share/nginx/dss-web;
	resolver 127.0.0.1;
        # Load configuration files for the default server block.
        include /etc/nginx/default.d/*.conf;
 	location /mqtt {
			proxy_pass http://127.0.0.1:8083/mqtt;
			proxy_connect_timeout 4s; #配置点1
    	   		proxy_read_timeout 120s; #配置点2，如果没效，可以考虑这个时间配置长一点
           		proxy_send_timeout 12s; #配置点3
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			# client_max_body_size 35m;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";    
		}

	location /dss {
                client_max_body_size 102400m;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
                proxy_pass_request_headers      on;
                proxy_set_header Host $host;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_pass http://127.0.0.1:9999$request_uri;
        }

        location /upload {
            root   /opt/download/;
	    ## limit_rate 1m;
	    ## limit_rate_after 1m;
        }
	location /atvm {
            # 修改为实际存放路径
            alias  /opt/atm/html;
            index  index.html index.htm;
        }
        #代理文件下载路径
	location /atm/download {
            # 修改为实际存放路径
            alias  /opt/atm/packages;
        }
        #容器服务端口
	location ^~ /atm/ {
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
            # 修改为实际端口
			proxy_pass http://127.0.0.1:8010/;

			proxy_read_timeout 3600s;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
 	location = /touping/ {
                return 403;
         }

        location = /touping/login {
                return 403;
         }
        location ^~ /touping/ {
                proxy_pass http://127.0.0.1:8080/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 3600s;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
        }

        location ^~ /emgr/ {
                proxy_pass http://127.0.0.1:9090/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 3600s;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $host;
        }	 
	location / {
		root /opt/dss-web;
		#index index.html index.htm;
		try_files $uri $uri/ /index.html;
  		add_header Access-Control-Allow-Methods *;
		add_header Cache-Control no-cache;
	}

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }


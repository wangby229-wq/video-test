server {
        listen       443 ssl;
        server_name  yunpindemo.bijienetworks.com;
	
        ssl_certificate      fullchain.pem;
        ssl_certificate_key  private.key;
        
        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

	access_log off;
        error_log /var/log/nginx/demo.error.log;        
	#ssl_ciphers  HIGH:!aNULL:!MD5;
        #ssl_prefer_server_ciphers  on;
        location / {
               root  html;
               index  index.html index.htm;
        }
 	location /sdkdoc {
                alias  /home/ecs-user/sdkdoc/.vitepress/dist;
        }
        	location /webcast.html {
                alias   /opt/html/wechat;
                index  index.html index.htm;
        }
	location /webcast-pre.html {
                alias   /opt/html/wechat-pre;
        	index  index.html index.htm;
        }
		location /webcast/dingtalk {
                alias   /opt/html/dingtalk;
                index  index.html index.htm;
        }
		location /webcast-pre/dingtalk {
                alias   /opt/html/dingtalk-pre;
        	index  index.html index.htm;
        }
	location = /touping/ {
                return 403;
         }

        location = /touping/login {
                return 403;
         }
                # 会议转录系统前端
                location /meeting {
                        rewrite ^/meeting$ /meeting/ permanent;
                }
                
                location /meeting/ {
                        alias /opt/wechat_meeting/dist/;
                        index index.html;
                }
                # 会议转录系统后端 API
                location ^~ /meeting/api/ {
                        rewrite ^/meeting/api/(.*)$ /api/$1 break;
                        proxy_pass http://127.0.0.1:8090;
                        proxy_http_version 1.1;
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                        client_max_body_size 500M;
                        proxy_read_timeout 300s;
                }

                # 会议转录系统上传文件
                location ^~ /meeting/uploads/ {
                        rewrite ^/meeting/uploads/(.*)$ /uploads/$1 break;
                        alias /opt/wechat_meeting/uploads/;
                        autoindex off;
                }
	location ^~ /touping/ {
			proxy_pass http://127.0.0.1:8080/;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";

			proxy_read_timeout 3600s;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header Host $http_host;
		}
		
		location ^~ /emgr/ {
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_pass http://127.0.0.1:9090/;

			proxy_read_timeout 3600s;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
		location ^~ /webcast/ {
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_pass http://127.0.0.1:9095/;

                        proxy_read_timeout 3600s;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";
                }
		location ^~ /dingtalk/ {
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_pass http://127.0.0.1:9096/;

                        proxy_read_timeout 3600s;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";
                }
		location ^~ /castinfoprovider/ {
                	proxy_pass http://127.0.0.1:8009/;
                	proxy_http_version 1.1;
                	proxy_set_header Upgrade $http_upgrade;
                	proxy_set_header Connection "upgrade";
                	client_max_body_size 1024m;
                	proxy_set_header X-Real-IP $remote_addr;
                	proxy_set_header Host $http_host;
        	}

	}

        server {
            listen       443 ssl;
            server_name  castapi.bijienetworks.com;

            ssl_certificate      fullchain.pem;
            ssl_certificate_key  private.key;

            ssl_session_cache    shared:SSL:1m;
            ssl_session_timeout  5m;

            access_log off;
            error_log /var/log/nginx/demo.error.log;
            #ssl_ciphers  HIGH:!aNULL:!MD5;
            #ssl_prefer_server_ciphers  on;
            location ^~ /castinfosource/ {
                        proxy_pass http://127.0.0.1:8008/;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";

                        proxy_read_timeout 3600s;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header Host $http_host;
            }
        }
		
	server {
        listen       443 ssl;
        server_name bjcastapp.bijienetworks.com;

        ssl_certificate      fullchain.pem;
        ssl_certificate_key  private.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        access_log /var/log/nginx/bjcastapp.access.log;
        error_log /var/log/nginx/bjcastapp.error.log;

         location ^~ /castinfoprovider/ {
                proxy_pass http://127.0.0.1:8009/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                client_max_body_size 1024m;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header Host $http_host;
         }

	}
	server {
        	listen       443 ssl;
        	server_name wechatpay.bijienetworks.com;

        	ssl_certificate      fullchain.pem;
        	ssl_certificate_key  private.key;

        	ssl_session_cache    shared:SSL:1m;
        	ssl_session_timeout  5m;

        	access_log /var/log/nginx/wechatpay.access.log;
        	error_log /var/log/nginx/wechatpay.error.log;
		
		location ^~ /snapshot/payment/ {
                        proxy_pass http://127.0.0.1:8012/;

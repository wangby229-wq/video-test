server {
    listen 443 ssl;
    server_name bjcastapp.bijienetworks.com;

    ssl_certificate      /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key  /etc/nginx/ssl/private.key;

    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/bjcastapp.access.log;
    error_log /var/log/nginx/bjcastapp.error.log;

    # 会议转录系统前端
    location / {
        root /opt/wechat_meeting/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 会议转录系统后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 现有服务 - castinfoprovider
    location ^~ /castinfoprovider/ {
        proxy_pass http://127.0.0.1:8009/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 1024m;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /opt/wechat_meeting/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 上传文件目录
    location /uploads/ {
        alias /opt/wechat_meeting/uploads/;
        autoindex off;
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name bjcastapp.bijienetworks.com;
    return 301 https://$server_name$request_uri;
}

# 在 yunpindemo.bijienetworks.com 服务器块中添加以下配置
# 位置：/etc/nginx/nginx.conf 中的 server_name yunpindemo.bijienetworks.com; 配置块中

# 在现有的 location / { } 之前或之后添加以下 location 块：

        # 会议转录系统前端
        location ^~ /meeting/ {
                root /opt/wechat_meeting/dist;
                index index.html;
                try_files $uri $uri/ /meeting/index.html;
        }

        # 会议转录系统后端 API
        location ^~ /meeting/api/ {
                rewrite ^/meeting/api/(.*)$ /api/$1 break;
                proxy_pass http://127.0.0.1:8090;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                client_max_body_size 500M;
                proxy_read_timeout 300s;
        }

        # 会议转录系统上传文件
        location ^~ /meeting/uploads/ {
                rewrite ^/meeting/uploads/(.*)$ /uploads/$1 break;
                alias /opt/wechat_meeting/uploads/;
                autoindex off;
        }
